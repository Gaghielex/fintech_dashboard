# Build Vite app and deploy to GitHub Pages.
#
# After first push with this file:
# 1. Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# 2. Repo → Settings → Secrets and variables → Actions → add repository secrets
#    used at build time (same names as your .env): VITE_SHEETS_API_KEY,
#    VITE_SHEET_ID, VITE_APP_PASSWORD
# 3. Site URL: https://<username>.github.io/fintech_dashboard/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_SHEETS_API_KEY: ${{ secrets.VITE_SHEETS_API_KEY }}
          VITE_SHEET_ID: ${{ secrets.VITE_SHEET_ID }}
          VITE_APP_PASSWORD: ${{ secrets.VITE_APP_PASSWORD }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
